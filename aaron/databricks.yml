bundle:
  name: luma

variables:
  agents_serving_endpoint_name:
    description: Default LLM serving endpoint name
  sql_warehouse_id:
    description: SQL Warehouse ID
  genie_space_id:
    description: Genie Space ID used for location resolution
  genie_space_name:
    description: Genie Space display name
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches {project-name}`, select the desired item from the output array and use its .name value. Requires the project resource name.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.
  postgres_project:
    description: Full Lakebase Postgres project resource name. Obtain by running `databricks postgres list-projects`, select the desired item from the output array and use its .name value.
  virtue_foundation_catalog:
    description: Unity Catalog containing the Virtue Foundation hackathon dataset (facilities, pincode directory). Grant to app SP via npm run setup:permissions.

resources:
  apps:
    app:
      name: "luma"
      description: "SMS health intake and facility finder for rural users"
      source_code_path: ./
      user_api_scopes:
        - sql
        - dashboards.genie
        - serving.serving-endpoints

      # The resources which this app has access to.
      resources:
        - name: agents-serving-endpoint
          serving_endpoint:
            name: ${var.agents_serving_endpoint_name}
            permission: CAN_QUERY
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-61784abb-0041.cloud.databricks.com

    variables:
      agents_serving_endpoint_name: databricks-claude-opus-4-8
      sql_warehouse_id: e4e23f31c3028908
      postgres_branch: projects/aaron-health/branches/production
      postgres_database: projects/aaron-health/branches/production/databases/databricks-postgres
      postgres_project: projects/aaron-health
      virtue_foundation_catalog: databricks_virtue_foundation_dataset_dais_2026
